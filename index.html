<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stored Memories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EB;
    --bg-2: #EBE7DD;
    --panel: #FFFFFF;
    --ink: #1C1B17;
    --ink-2: #57544C;
    --ink-3: #8C8779;
    --ink-4: #B5AF9E;
    --line: #E5E0D2;
    --line-2: #D9D2BF;
    --accent: #9B4F2C;
    --accent-ink: #2F1B10;
    --tag-bg: #F0EBDD;
    --tag-bg-hover: #E7E1D0;

    --r-card: 14px;
    --r-tag: 999px;

    --shadow-1: 0 1px 0 rgba(28,27,23,0.04), 0 1px 2px rgba(28,27,23,0.04);
    --shadow-2: 0 12px 32px -12px rgba(28,27,23,0.18), 0 4px 12px -4px rgba(28,27,23,0.08);
    --shadow-modal: 0 40px 80px -20px rgba(28,27,23,0.35), 0 12px 32px -8px rgba(28,27,23,0.18);

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 40px 120px;
  }

  /* ---------- Header ---------- */
  .head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    margin-bottom: 28px;
  }
  .head-l { min-width: 0; }
  .crumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .crumb .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .crumb-sep { color: var(--ink-4); margin: 0 4px; }
  .crumb-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-2);
  }
  .crumb-pulse {
    position: relative;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4FA37A;
    box-shadow: 0 0 0 3px rgba(79,163,122,0.18);
    display: inline-block;
  }
  .crumb-pulse::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.2px solid rgba(79,163,122,0.6);
    animation: pulse 2.2s ease-out infinite;
  }
  .crumb-status .ping { color: var(--ink-3); }
  h1.title {
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: 56px;
    line-height: 1.02;

  .head-r {

    align-items: flex-end;
    gap: 12px;
    flex-shrink: 0;

  .stat {

    font-family: "Newsreader", Georgia, serif;
    color: var(--ink);

  .stat .n {
    font-size: 48px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .stat .lab {

    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    margin-top: 6px;
  }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }
  .tabs { display: flex; gap: 2px; }
  .tab {
    appearance: none;
    border: 0;
    background: transparent;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-3);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color .15s, background .15s;
  }
  .tab:hover { color: var(--ink); background: rgba(28,27,23,0.04); }
  .tab.active { color: var(--ink); background: rgba(28,27,23,0.06); }
  .tab svg { width: 14px; height: 14px; }
  .tab .count {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    background: var(--tag-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .tab.active .count { background: rgba(28,27,23,0.08); color: var(--ink-2); }

  .tool-r { display: flex; align-items: center; gap: 12px; }
  .search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);

    padding: 7px 12px;
    width: 280px;

  .search:focus-within { border-color: var(--line-2); box-shadow: 0 0 0 4px rgba(155,79,44,0.08); }
  .search svg { width: 14px; height: 14px; color: var(--ink-3); flex-shrink: 0; }
  .search input {
    border: 0;
    background: transparent;
    outline: none;
    font: inherit;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
  }
  .search input::placeholder { color: var(--ink-3); }
  .kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .sort {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-2);
    cursor: pointer;
    padding: 7px 10px;
    border-radius: 8px;
  }
  .sort:hover { background: rgba(28,27,23,0.04); color: var(--ink); }
  .sort svg { width: 14px; height: 14px; }

  /* ---------- Layout (sidebar + main) ---------- */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .layout { grid-template-columns: 1fr; gap: 28px; }
  }
  .main { min-width: 0; }

  /* ---------- Sidebar ---------- */
  .side { display: flex; flex-direction: column; gap: 28px; position: sticky; top: 32px; }
  @media (max-width: 980px) { .side { position: static; } }
  .side-section h4 {
    margin: 0 0 12px;
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.005em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .side-section h4 svg { width: 16px; height: 16px; color: var(--accent); }

  .status-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-card);
    padding: 26px 18px 22px;
    box-shadow: var(--shadow-1);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .status-dot-wrap {
    position: relative;
    width: 14px; height: 14px;
    margin: 0 auto 14px;
  }
  .status-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4FA37A;
    box-shadow: 0 0 0 5px rgba(79,163,122,0.16);
    position: relative;
    z-index: 2;
  }
  .status-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(79,163,122,0.6);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  .status-label {
    font-family: "JetBrains Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    color: var(--ink);
    font-weight: 500;
  }
  .status-sub {
    margin-top: 6px;
    font-size: 11px;
    color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-tile {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 12px 14px;
    box-shadow: var(--shadow-1);
    text-align: center;
    transition: border-color .15s, transform .15s;
  }
  .stat-tile:hover { border-color: var(--line-2); transform: translateY(-1px); }
  .stat-tile.wide { grid-column: span 2; }
  .stat-tile .v {
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .stat-tile.zero .v { color: var(--ink-4); }
  .stat-tile .l {
    margin-top: 8px;
    font-family: "JetBrains Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
    color: var(--ink-3);
  }
  .stat-tile .delta {
    margin-top: 5px;
    font-size: 10.5px;
    color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
  }
  .stat-tile .delta.up { color: #4FA37A; }

  /* ---------- Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 22px;
  }
  @media (min-width: 1100px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-1);
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, border-color .15s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-2);
    border-color: var(--line-2);
  }
  .card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Cover ---------- */
  .cover {
    position: relative;
    aspect-ratio: 16 / 9;
    background: var(--cover-bg, #EFEBDF);
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .cover-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.55;
  }
  .cover-meta {
    position: absolute;
    inset: 14px 14px auto 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    z-index: 2;
  }
  .type-pill {
    background: rgba(28,27,23,0.78);
    color: #F6F1E4;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 3px 7px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }
  .cover-corner {
    position: absolute;
    left: 14px;
    bottom: 12px;
    right: 14px;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
    pointer-events: none;
  }
  .source {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--cover-ink, #4A4538);
    background: rgba(255,253,247,0.7);
    padding: 3px 7px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
    max-width: 75%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Cover content variants */
  .cover-art {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- Card body ---------- */
  .body {
    padding: 22px 22px 22px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    flex: 1;
  }
  .body-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .mem-id { color: var(--ink-2); font-weight: 500; }
  .file-row {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 2px;
  }
  .type-pill.solid {
    background: var(--tag-bg);
    color: var(--ink-2);
    backdrop-filter: none;
    flex-shrink: 0;
  }
  .file-name {
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    color: var(--ink-3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .body h3 {
    margin: 0;
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.22;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .desc {
    margin: 0;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-2);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--tag-bg);
    color: var(--ink-2);
    border-radius: var(--r-tag);
    padding: 3px 9px 3px 8px;
    font-size: 12px;
    line-height: 1.4;
    white-space: nowrap;
  }
  .tag .swatch {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--swatch, var(--ink-3));
  }
  .tag-more {
    color: var(--ink-3);
    font-size: 12px;
    padding: 3px 4px;
  }

  /* ---------- Empty state ---------- */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-3);
    border: 1px dashed var(--line-2);
    border-radius: 16px;
    background: rgba(255,255,255,0.4);
  }
  .empty h4 {
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 22px;
    margin: 0 0 6px;
  }

  /* ---------- Modal ---------- */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(28,27,23,0.42);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    z-index: 50;
    animation: fade-in .18s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel);
    border-radius: 18px;
    width: min(880px, 100%);
    max-height: calc(100vh - 64px);
    overflow: hidden;
    box-shadow: var(--shadow-modal);
    display: flex;
    flex-direction: column;
    animation: slide-up .26s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-cover {
    position: relative;
    aspect-ratio: 16/7;
    background: var(--cover-bg, #EFEBDF);
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    appearance: none;
    border: 0;
    background: rgba(28,27,23,0.78);
    color: #F6F1E4;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--accent-ink); }
  .modal-close svg { width: 14px; height: 14px; }
  .modal-body {
    padding: 28px 36px 32px;
    overflow-y: auto;
  }
  .modal-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .modal h2 {
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .modal .desc-lg {
    font-family: "Newsreader", Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 24px;
    font-style: italic;
    border-left: 2px solid var(--line-2);
    padding-left: 16px;
  }
  .props {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 10px 20px;
    padding: 18px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .prop-k {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    padding-top: 3px;
  }
  .prop-v {
    color: var(--ink);
    font-size: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .prop-v.mono { font-family: "JetBrains Mono", monospace; font-size: 13px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--line-2);
    background: var(--panel);
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all .15s;
  }
  .btn:hover { background: var(--bg-2); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
  .btn svg { width: 13px; height: 13px; }

  @media (max-width: 740px) {
    .app { padding: 32px 20px 80px; }
    h1.title { font-size: 40px; }
    .head { flex-direction: column; align-items: flex-start; }
    .head-r { align-items: flex-start; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search { width: 100%; }
    .modal-body { padding: 22px 22px 26px; }
    .props { grid-template-columns: 1fr; gap: 4px; }
    .prop-k { padding-top: 12px; }
  }
</style>
</head>

<div id="root"></div>

/* ===================== TAG COLORS ===================== */
// Stable hue per tag via string hash → muted oklch swatches
function hashHue(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h) % 360;
}
function tagColor(tag) {
  const h = hashHue(tag.toLowerCase());
  return `oklch(0.65 0.08 ${h})`;
}

function Cover({ kind }) {

  let art = null;
  if (kind === "slide") art = <SlideCover palette={palette} />;

  return (
    <>

/* ===================== HELPERS ===================== */
function formatDate(iso) {
  const d = new Date(iso);
  const opts = { month: "short", day: "numeric", year: "numeric" };
  return d.toLocaleDateString("en-US", opts);
}
function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
}
function relativeDate(iso) {
  const now = new Date("2026-05-22T00:00:00");
  const d = new Date(iso);
  const days = Math.floor((now - d) / 86400000);
  if (days === 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 7) return `${days} days ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return formatDate(iso);
}

/* ===================== CARD ===================== */
function MemoryCard({ m, onOpen }) {
  return (
    <article
      className="card"
      tabIndex="0"
      onClick={() => onOpen(m)}
      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOpen(m); } }}
      aria-label={`Memory ${m.id}: ${m.title}`}
    >
      <div className="body">
        <div className="body-top">
          <span className="mem-id">Memory · #{String(m.id).padStart(2, "0")}</span>
          <span>{relativeDate(m.date)}</span>
        </div>
        <h3>{m.title}</h3>
        <p className="desc">{m.description}</p>
        <div className="file-row">
          <span className="type-pill solid">{m.ext}</span>
          <span className="file-name" title={m.source}>{m.source}</span>
        </div>
        <div className="tags">
          {m.tags.slice(0, 4).map((t) => (
            <span className="tag" key={t} style={{ "--swatch": tagColor(t) }}>
              <span className="swatch"></span>{t}
            </span>
          ))}
          {m.tags.length > 4 && <span className="tag-more">+{m.tags.length - 4} more</span>}
        </div>
      </div>
    </article>
  );
}

/* ===================== MODAL ===================== */
function MemoryModal({ m, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [onClose]);
  if (!m) return null;
  return (
    <div className="scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" ref={ref} role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div className="modal-cover" style={{ "--cover-bg": COVER_PALETTE[m.cover].bg, "--cover-ink": COVER_PALETTE[m.cover].ink }}>
          <Cover kind={m.cover} />
          <div className="cover-meta">
            <span style={{flex:1}}></span>
            <span className="type-pill">{m.ext}</span>
          </div>
          <div className="cover-corner">
            <span className="source">{m.source}</span>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Close">{Icon.close}</button>
        </div>
        <div className="modal-body">
          <div className="modal-eyebrow">
            <span style={{color: "var(--accent)", fontWeight:600}}>Memory · #{String(m.id).padStart(2, "0")}</span>
            <span>·</span>
            <span>Captured {formatDate(m.date)} at {formatTime(m.date)}</span>
          </div>
          <h2 id="modal-title">{m.title}</h2>
          <p className="desc-lg">"{m.description}"</p>
          <div className="props">
            <div className="prop-k">Source</div>
            <div className="prop-v mono">{m.source}</div>
            <div className="prop-k">Type</div>
            <div className="prop-v">{m.kind === "pdf" ? "PDF document" : "Image"} · <span style={{color:"var(--ink-3)"}}>{m.ext}</span></div>
            <div className="prop-k">Captured</div>
            <div className="prop-v mono">{m.date.replace("T", " · ")}</div>
            <div className="prop-k">Tags ({m.tags.length})</div>
            <div className="prop-v">
              {m.tags.map((t) => (
                <span className="tag" key={t} style={{ "--swatch": tagColor(t) }}>
                  <span className="swatch"></span>{t}
                </span>
              ))}
            </div>
          </div>
          <div className="modal-actions">
            <button className="btn primary">{Icon.open}Open source</button>
            <button className="btn">{Icon.download}Download</button>
            <span style={{flex:1}}></span>
            <button className="btn" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [query, setQuery] = useState("");
  const [activeTags] = useState(new Set());
  const [open, setOpen] = useState(null);
  const [view, setView] = useState("gallery");

  const stats = {
    memories: MEMORIES.length,
    pending: 4,
    consolidations: 0,
  };

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return MEMORIES.filter((m) => {
      const hay = (m.title + " " + m.description + " " + m.tags.join(" ") + " " + m.source).toLowerCase();
      if (q && !hay.includes(q)) return false;
      if (activeTags.size > 0) {
        for (const t of activeTags) if (!m.tags.includes(t)) return false;
      }
      return true;
    });
  }, [query, activeTags]);

  return (
    <div className="app">
      <header className="head">
        <div className="head-l">
          <div className="crumb">
            <span>Agent · memory layer</span>
            <span className="crumb-sep">—</span>
            <span className="crumb-status">
              <span className="crumb-pulse"></span>
              <span>Online</span>
              <span className="ping">· last ping 12s ago</span>
            </span>
          </div>
        </div>
      </header>

      <div className="layout">
        <aside className="side">
          <section className="side-section">
            <h4>
              {Icon.chart}
              Memory Stats
            </h4>
            <div className="stats-grid">
              <div className="stat-tile">
                <div className="v">{String(stats.memories).padStart(2, "0")}</div>
                <div className="l">Memories</div>
                <div className="delta up">+2 this week</div>
              </div>
              <div className="stat-tile">
                <div className="v">{String(stats.pending).padStart(2, "0")}</div>
                <div className="l">Pending</div>
                <div className="delta">awaiting review</div>
              </div>
              <div className="stat-tile wide zero">
                <div className="v">{String(stats.consolidations).padStart(2, "0")}</div>
                <div className="l">Consolidations</div>
                <div className="delta">none scheduled</div>
              </div>
            </div>
          </section>
        </aside>

        <div className="main">
          <div className="toolbar" style={{display:"none"}}>
            <div className="tabs">
              <button className={"tab " + (view === "gallery" ? "active" : "")} onClick={() => setView("gallery")}>
                {Icon.grid} Gallery <span className="count">{MEMORIES.length}</span>
              </button>
              <button className={"tab " + (view === "list" ? "active" : "")} onClick={() => setView("list")}>
                {Icon.list} List
              </button>
              <button className={"tab " + (view === "table" ? "active" : "")} onClick={() => setView("table")}>
                {Icon.table} Table
              </button>
            </div>
            <div className="tool-r">
              <div className="search">
                {Icon.search}
                <input
                  placeholder="Search memories, tags, sources…"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                />
                <span className="kbd">⌘K</span>
              </div>
              <button className="sort">{Icon.sort} Newest first</button>
            </div>
          </div>

          <div className="grid">
            {filtered.length === 0 && (
              <div className="empty">
                <h4>No memories match</h4>
                <p>Try clearing filters or adjusting your search.</p>
              </div>
            )}
            {filtered.map((m) => <MemoryCard key={m.id} m={m} onOpen={setOpen} />)}
          </div>
        </div>
      </div>

      {open && <MemoryModal m={open} onClose={() => setOpen(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
